<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Depósito</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
  <script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</head>

<body>

<header class="topbar">
  <div>
    <h1 id="shopName">Depósito</h1>
  </div>

  <div class="top-actions">
    <button id="settingsBtn" class="icon-button">⚙️</button>
    <button id="connectBtn">Fazer Login</button>
    <button id="disconnectBtn" class="hidden">Sair</button>
  </div>
</header>

<nav class="nav">
  <button id="navVenda" class="active">Venda</button>
  <button id="navRelatorio">Relatórios</button>
  <button id="navCaixa">Fluxo de Caixa</button>
</nav>

<main>

<section id="pageVenda">

<div class="receipt">

<div class="receipt-header">
  <img src="logo.png" class="logo" id="logoImg">
  <div>
    <h2 id="shopName2">Depósito</h2>
    <p id="currentDateTime"></p>
  </div>
</div>

<input id="customerName" placeholder="Nome do cliente">

<table class="receipt-table">
  <thead>
    <tr>
      <th>Qtd</th>
      <th>Descrição</th>
      <th>Valor</th>
      <th>Total</th>
      <th></th>
    </tr>
  </thead>
  <tbody id="itemsBody"></tbody>
</table>

<button id="addRowBtn">+ Item</button>

<div class="total">
  Total: <span id="grandTotalDisplay">R$ 0,00</span>
</div>

<button id="submitSaleBtn">Enviar</button>

</div>

</section>

<section id="pageRelatorio" class="hidden">
  <h2>Relatórios (em construção)</h2>
</section>

<section id="pageCaixa" class="hidden">
  <h2>Fluxo de Caixa (em construção)</h2>
</section>

</main>

<script src="app.js"></script>

</body>
</html>
